<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attendance Ledger</title>
<style>
  :root {
    --ink: #1f2a24;
    --paper: #f6f3ea;
    --card: #ffffff;
    --forest: #2c4a3b;
    --forest-deep: #1a3327;
    --gold: #c8952f;
    --gold-soft: #f0deb3;
    --line: #d9d2bd;
    --muted: #7c7568;
    --present: #2c4a3b;
    --absent: #b6503a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(ellipse 80% 50% at 10% -10%, rgba(240, 222, 179, 0.55), transparent 55%),
      radial-gradient(ellipse 60% 40% at 100% 0%, rgba(44, 74, 59, 0.08), transparent 50%),
      var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 0 0 60px 0;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(160deg, var(--forest-deep) 0%, #243f32 100%);
    color: var(--paper);
    padding: 28px 24px 22px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
  }
  .header-inner {
    max-width: 880px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 26px;
    margin: 0;
    letter-spacing: 0.3px;
  }
  h1 span { color: var(--gold-soft); font-style: italic; }
  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .date-row label { font-size: 13px; color: var(--gold-soft); }
  .date-row input[type="date"] {
    background: var(--forest);
    border: 1px solid var(--gold);
    color: var(--paper);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .summary-bar {
    max-width: 880px;
    margin: 18px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--muted);
  }
  .summary-bar b { color: var(--forest-deep); font-size: 16px; }
  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 24px;
  }
  .group {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 18px;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }
  .group:nth-child(2) { animation-delay: 0.04s; }
  .group:nth-child(3) { animation-delay: 0.08s; }
  .group:nth-child(4) { animation-delay: 0.12s; }
  .group:nth-child(5) { animation-delay: 0.16s; }
  .group:nth-child(6) { animation-delay: 0.2s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .group-head {
    background: var(--gold-soft);
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .group-head h2 {
    font-family: Georgia, serif;
    font-size: 17px;
    margin: 0;
    color: var(--forest-deep);
  }
  .group-count {
    font-size: 12.5px;
    color: var(--forest);
    background: rgba(255,255,255,0.6);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .group-body { padding: 6px 10px; }
  .person-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 10px;
    border-bottom: 1px solid #f0ede1;
    font-size: 15px;
  }
  .person-row:last-of-type { border-bottom: none; }
  .person-name { flex: 1; min-width: 0; }
  .person-actions { display: flex; align-items: center; gap: 8px; }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn {
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--muted);
    padding: 6px 13px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .toggle-btn.present.active {
    background: var(--present);
    border-color: var(--present);
    color: white;
  }
  .toggle-btn.absent.active {
    background: var(--absent);
    border-color: var(--absent);
    color: white;
  }
  .remove-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 6px;
  }
  .add-row {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid #f0ede1;
  }
  .add-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
  }
  .add-row button {
    background: var(--forest);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .actions {
    display: flex;
    gap: 10px;
    max-width: 880px;
    margin: 6px auto 0;
    padding: 0 24px;
    flex-wrap: wrap;
  }
  .actions button {
    background: var(--forest-deep);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13.5px;
    cursor: pointer;
  }
  .actions button.secondary {
    background: white;
    color: var(--forest-deep);
    border: 1px solid var(--line);
  }
  .status-msg {
    max-width: 880px;
    margin: 10px auto 0;
    padding: 0 24px;
    font-size: 12.5px;
    color: var(--muted);
    min-height: 16px;
  }
  .collapsed .group-body { display: none; }
  .chevron { transition: transform 0.15s ease; color: var(--forest); font-size: 12px; display: inline-block; }
  .collapsed .chevron { transform: rotate(-90deg); }
  @media (max-width: 640px) {
    .person-row { flex-direction: column; align-items: stretch; }
    .person-actions { justify-content: space-between; }
    .toggle-btn { flex: 1; text-align: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Attendance <span>Ledger</span></h1>
    <div class="date-row">
      <label for="attDate">Date</label>
      <input type="date" id="attDate">
    </div>
  </div>
</header>

<div class="summary-bar">
  <div>Present: <b id="countPresent">0</b></div>
  <div>Absent: <b id="countAbsent">0</b></div>
  <div>Not marked: <b id="countUnmarked">0</b></div>
  <div>Total roster: <b id="countTotal">0</b></div>
</div>

<div class="actions">
  <button id="saveBtn">Save attendance</button>
  <button class="secondary" id="markAllPresent">Mark all present</button>
  <button class="secondary" id="exportBtn">Export CSV</button>
</div>
<div class="status-msg" id="statusMsg">Attendance saves automatically on this device.</div>

<main id="groupsContainer"></main>

<script>
const STORAGE_KEY = "church-attendance-state-v1";
const ROSTER_KEY = "church-attendance-roster-v1";

const DEFAULT_ROSTER = {
  "Aliye's Group": ["Anthony","Heba","Jeremy","Jordan","Josiah","Odera","Patrick","Tessa","Kokou","Kriti","Adrianna","Judith"],
  "Augustus's Group": ["Dieumerci","Ashlee","Brian","Furri","Pastor Glodie","Pressley","Terrence","Israel","Gerald","Uyi","Aliye","Chancela","Chidi","Diana","Ephraim","Jeff","Korey","Mama Vivian","Nancy","Shalyne"],
  "Diana's Group": ["Caleb","Dawit","Ian","Kameron","Lady Nikki","Rehema"],
  "Naa's Group": ["Chiche","Kriti","Mac Noble","Mya","Tarmadji","Theresa","Treasure"],
  "Shalyne's Group": ["Eden M","Morris","Talent","Trishana","Vanessa","Dennis","Brian","Douglas","Maru"],
  "Needs a Group": ["Lucky","Atrel/Joseph","Dezhon","Johan"]
};

let roster = structuredClone(DEFAULT_ROSTER);
let state = {};
let currentDate = new Date().toISOString().slice(0,10);

const container = document.getElementById('groupsContainer');
const dateInput = document.getElementById('attDate');
dateInput.value = currentDate;

function personKey(group, name) { return group + '|' + name; }

function flash(msg) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  setTimeout(() => { el.textContent = 'Attendance saves automatically on this device.'; }, 2500);
}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  localStorage.setItem(ROSTER_KEY, JSON.stringify(roster));
}

function render() {
  container.innerHTML = '';
  let total = 0;
  for (const [group, people] of Object.entries(roster)) {
    total += people.length;
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    const head = document.createElement('div');
    head.className = 'group-head';
    head.innerHTML = `<h2>${group} <span class="chevron">▾</span></h2><span class="group-count">${people.length}</span>`;
    head.onclick = () => groupEl.classList.toggle('collapsed');
    groupEl.appendChild(head);

    const body = document.createElement('div');
    body.className = 'group-body';

    people.forEach(name => {
      const row = document.createElement('div');
      row.className = 'person-row';
      const key = personKey(group, name);
      const current = (state[currentDate] || {})[key];
      row.innerHTML = `
        <span class="person-name">${name}</span>
        <span class="person-actions">
          <span class="toggle-group">
            <button class="toggle-btn present ${current==='present'?'active':''}" data-key="${key}" data-val="present">Present</button>
            <button class="toggle-btn absent ${current==='absent'?'active':''}" data-key="${key}" data-val="absent">Absent</button>
          </span>
          <button class="remove-btn" data-group="${group}" data-name="${name}">Remove</button>
        </span>`;
      body.appendChild(row);
    });

    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.innerHTML = `<input type="text" placeholder="Add a name…" data-group="${group}"><button data-add="${group}">Add</button>`;
    body.appendChild(addRow);

    groupEl.appendChild(body);
    container.appendChild(groupEl);
  }
  document.getElementById('countTotal').textContent = total;
  attachHandlers();
  updateCounts();
}

function attachHandlers() {
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.onclick = () => {
      const key = btn.dataset.key;
      const val = btn.dataset.val;
      if (!state[currentDate]) state[currentDate] = {};
      state[currentDate][key] = (state[currentDate][key] === val) ? undefined : val;
      if (state[currentDate][key] === undefined) delete state[currentDate][key];
      persist();
      render();
    };
  });

  document.querySelectorAll('.remove-btn').forEach(btn => {
    btn.onclick = () => {
      const group = btn.dataset.group;
      const name = btn.dataset.name;
      const key = personKey(group, name);
      roster[group] = (roster[group] || []).filter(n => n !== name);
      for (const day of Object.values(state)) delete day[key];
      persist();
      render();
    };
  });

  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.onclick = () => {
      const group = btn.dataset.add;
      const input = btn.parentElement.querySelector('input');
      const name = (input.value || '').trim();
      if (!name) return;
      if (!(roster[group] || []).some(n => n.toLowerCase() === name.toLowerCase())) {
        roster[group] = [...(roster[group] || []), name];
        persist();
        render();
      }
    };
  });

  document.querySelectorAll('.add-row input').forEach(input => {
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        input.parentElement.querySelector('button').click();
      }
    };
  });
}

function updateCounts() {
  const dayState = state[currentDate] || {};
  let present = 0, absent = 0;
  Object.values(dayState).forEach(v => { if (v === 'present') present++; if (v === 'absent') absent++; });
  const total = parseInt(document.getElementById('countTotal').textContent || '0');
  document.getElementById('countPresent').textContent = present;
  document.getElementById('countAbsent').textContent = absent;
  document.getElementById('countUnmarked').textContent = Math.max(total - present - absent, 0);
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch (e) { state = {}; }
  try {
    const savedRoster = localStorage.getItem(ROSTER_KEY);
    if (savedRoster) roster = JSON.parse(savedRoster);
  } catch (e) { roster = structuredClone(DEFAULT_ROSTER); }
  render();
}

dateInput.addEventListener('change', () => {
  currentDate = dateInput.value;
  render();
});

document.getElementById('saveBtn').onclick = () => {
  persist();
  flash('Saved ' + new Date().toLocaleTimeString());
};

document.getElementById('markAllPresent').onclick = () => {
  if (!state[currentDate]) state[currentDate] = {};
  for (const [group, people] of Object.entries(roster)) {
    people.forEach(name => { state[currentDate][personKey(group, name)] = 'present'; });
  }
  persist();
  render();
  flash('Marked everyone present');
};

document.getElementById('exportBtn').onclick = () => {
  const dayState = state[currentDate] || {};
  let rows = [['Group','Name','Status']];
  for (const [group, people] of Object.entries(roster)) {
    people.forEach(name => {
      const status = dayState[personKey(group, name)] || 'not marked';
      rows.push([group, name, status]);
    });
  }
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `attendance-${currentDate}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

loadState();
</script>

</body>
</html>
